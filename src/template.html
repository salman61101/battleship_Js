<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
</head>

<body>

    <header>

        <h1>Battleship</h1>

        <p id="status">
            Your Turn
        </p>

        <button id="restart-btn">
            Restart Game
        </button>

        <button id="random-placement-btn">
            Randomize Your Fleet
        </button>

    </header>

    <main>

        <section class="board-section">

            <div>

                <h2>Your Board</h2>


                <div id="player-board" class="board">
                </div>

            </div>

            <div>

                <h2>Enemy Board</h2>

                <div id="computer-board" class="board">
                </div>

            </div>

        </section>

    </main>

</body>

</html>
